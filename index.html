<!doctype html>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme & Status Bar -->
    <meta name="theme-color" content="#1a1412" />
    <meta name="background-color" content="#1a1412" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GG POS" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Windows Tile -->
    <meta name="msapplication-TileColor" content="#1a1412" />

    <meta name="description" content="Sistem Kasir Enterprise GG Pasoryan" />

    <!-- Prevent phone number detection (Android WebView) -->
    <meta name="format-detection" content="telephone=no" />
