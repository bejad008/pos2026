<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GG POS — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1412;
      color: #fef3c7;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #991b1b;
      border: 2px solid #f59e0b;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #fcd34d;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 24px rgba(220,38,38,0.4);
    }
    h1 { font-size: 1.5rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.5rem; }
    p { color: #92400e; font-family: monospace; font-size: 0.85rem; margin-bottom: 2rem; }
    .msg { font-size: 1rem; color: #fbbf24; margin-bottom: 0.5rem; }
    .sub { font-size: 0.8rem; color: #78350f; font-family: monospace; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #991b1b;
      border: 1px solid #f59e0b;
      color: #fef3c7;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    button:hover { background: #7f1d1d; }
  </style>
</head>
<body>
  <div class="logo">G</div>
  <h1>GG <span style="color:#ef4444">POS</span></h1>
  <p>SISTEM KASIR ENTERPRISE</p>
  <div class="msg">⚠️ Tidak Ada Koneksi Internet</div>
  <div class="sub">Hubungkan ke jaringan untuk mengakses data Firebase</div>
  <button onclick="location.reload()">🔄 Coba Lagi</button>
</body>
</html>
